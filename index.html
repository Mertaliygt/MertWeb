<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Özel Mesajlaşma Platformu</title>
    <link rel="stylesheet" href="style.css">
</head>
<script src="script.js"></script>
<body>

    <div class="auth-container">
        <div class="auth-box">
            <h2>Giriş Yap</h2>
            <form id="loginForm">
                <input type="text" id="username" placeholder="Kullanıcı Adı" required>
                <input type="password" id="password" placeholder="Şifre" required>
                <button type="submit">Giriş</button>
            </form>
        </div>
    </div>

    <div class="chat-container" style="display: none;">
        
        <div class="sidebar">
            <div class="user-list">
                <h3>Kullanıcılar</h3>
                <ul>
                    <li class="active-user">Kullanıcı 1 (Aktif)</li>
                    <li>Kullanıcı 2</li>
                    <li>Kullanıcı 3</li>
                </ul>
            </div>
        </div>
        
        <div class="chat-area">
            
            <header class="chat-header">
                <h2>Sohbet (Kullanıcı 1)</h2>
            </header>
            
            <div class="messages">
                <div class="message incoming">
                    <p>Merhaba, özel bir mesajım var.</p>
                </div>
                <div class="message outgoing">
                    <p>Tamam, dinliyorum.</p>
                </div>
            </div>
            
            <div class="message-input-area">
                <input type="text" id="messageInput" placeholder="Mesaj yazın...">
                <button id="sendButton">Gönder</button>
            </div>
        </div>
    </div>

</body>
</html>
